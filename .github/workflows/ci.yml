name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixar o código
      - uses: actions/checkout@v3

      # 2. Configurar Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Instalar dependências (app + dev)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pytest httpx
          # Copiar o banco de dados local para a CI (necessário para os testes)
          if [ -f "mlflow.db" ]; then cp mlflow.db /tmp/mlflow.db; fi

      # 4. Verificar Estilo de Código (Linting)
      - name: Lint with Black
        run: black --check .
      
      - name: Lint with Flake8
        run: |
          # Ignorar erros de linha longa e imports não usados em __init__.py
          flake8 . --count --max-line-length=120 --statistics --exclude=__init__.py

      # 5. Rodar Testes
      - name: Test with Pytest
        run: |
          # Copiar o DB para a pasta onde o teste roda
          if [ -f "/tmp/mlflow.db" ]; then cp /tmp/mlflow.db .; fi
          pytest -v

      # 6. Verificar se o Docker Build funciona
      - name: Build Docker Image
        run: docker build -t xgb-predictor-test .
