name: Auto-Retrain on Drift

on:
  schedule:
    - cron: '0 2 * * *'  # Todo dia às 02:00 UTC
  workflow_dispatch:     # Permite rodar manualmente

jobs:
  check-and-retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow scikit-learn xgboost
          
      - name: Run Auto-Retrain Script
        run: python3 src/auto_retrain.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'http://localhost:5000' }}
          
      - name: Commit config update (if changed)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add config.json
          git diff --staged --quiet || git commit -m "chore: update active model run_id"
          git push
